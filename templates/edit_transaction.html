<!DOCTYPE html>
<html>
<head>
    <title>Edit Transaction</title>
</head>
<body>
    <h1>Edit Transaction</h1>
    <form method="post">
        Amount: <input type="number" step="0.01" name="amount" value="{{ transaction.amount }}" required><br>
        Type:
        <select name="type">
            <option value="income" {% if transaction.type=='income' %}selected{% endif %}>Income</option>
            <option value="expense" {% if transaction.type=='expense' %}selected{% endif %}>Expense</option>
        </select><br>
        Date: <input type="date" name="date" value="{{ transaction.date }}" required><br>
        Category:
        <select name="category_id">
            {% for c in categories %}
                <option value="{{ c.id }}" {% if c.id==transaction.category_id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
        </select><br>
        <input type="submit" value="Update">
    </form>
    <a href="{{ url_for('transactions') }}">Back</a>
</body>
</html>
