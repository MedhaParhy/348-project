<!DOCTYPE html>
<html>
<head>
    <title>Transactions</title>
</head>
<body>
    <h1>Transactions</h1>
    <a href="{{ url_for('add_transaction') }}">Add Transaction</a> |
    <a href="{{ url_for('report') }}">View Report</a>
    <table border="1" cellpadding="5">
        <tr>
            <th>ID</th><th>Amount</th><th>Type</th><th>Date</th><th>Category</th><th>Actions</th>
        </tr>
        {% for t in transactions %}
        <tr>
            <td>{{ t.id }}</td>
            <td>{{ t.amount }}</td>
            <td>{{ t.type }}</td>
            <td>{{ t.date }}</td>
            <td>{{ t.category.name }}</td>
            <td>
                <a href="{{ url_for('edit_transaction', id=t.id) }}">Edit</a> |
                <a href="{{ url_for('delete_transaction', id=t.id) }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
